<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="apple-touch-icon" href="../icon.svg">
  <script>
    (function () {
      document.documentElement.classList.add('js');
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'dark' && t !== 'light') t = 'light';
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <title>Admin Console – TheDiscomBill</title>
  <meta name="description" content="Internal admin console for TheDiscomBill.">
  <!-- Internal tool — keep out of search results. -->
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- ── Header (minimal — internal console) ─────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2.5 6.2 13.1c-.27.42.03.95.52.95H11l-1 7.4c-.09.62.72.94 1.07.43L18 11.2c.28-.42-.02-.95-.52-.95H13l1-7.2c.09-.6-.69-.94-1-.55Z" fill="currentColor" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
        </svg>
      </span>
      <div>
        <span class="logo-text">TheDiscomBill</span>
        <span class="logo-tagline">Admin Console</span>
      </div>
    </a>
    <nav class="header-nav">
      <a href="/expert/">Expert console</a>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch theme" title="Toggle light / dark theme">☾</button>
    </nav>
  </div>
</header>

<div class="page-body">
  <section class="svc-section">
    <div class="container container-mid">
      <h2 class="reveal">Admin Console</h2>
      <p class="svc-intro reveal">Manage accounts, promote experts and open the internal tools.
      Admin access is granted in <code>supabase/admin.sql</code>.</p>

      <div id="adAccount"></div>
      <div id="adMain" class="reveal"><p class="tx-muted">Loading…</p></div>
    </div>
  </section>
</div>

<footer>
  <div class="container">
    <p>&copy; 2026 TheDiscomBill. Internal tool.</p>
  </div>
</footer>

<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/admin.js"></script>

</body>
</html>
