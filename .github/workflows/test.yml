name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No dependencies to install — the suite is plain Node ESM.
      - name: Syntax-check all JS files
        run: find js/ -name '*.js' -exec node --check {} +
      - name: Run engine regression tests
        run: npm test
