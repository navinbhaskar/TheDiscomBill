<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1a3d"/>
      <stop offset="0.55" stop-color="#143069"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="totalBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- faint bolt watermark bottom-left -->
  <g transform="translate(-40,300) scale(20)" opacity="0.05" fill="#ffffff">
    <path d="M13 2.5 6.2 13.1c-.27.42.03.95.52.95H11l-1 7.4c-.09.62.72.94 1.07.43L18 11.2c.28-.42-.02-.95-.52-.95H13l1-7.2c.09-.6-.69-.94-1-.55Z"/>
  </g>
  <!-- amber top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="#fbbf24"/>

  <!-- ── Left column ─────────────────────────────────────────── -->
  <!-- Logo chip -->
  <rect x="72" y="62" width="84" height="84" rx="20" fill="#2563eb"/>
  <g transform="translate(90,80) scale(2)" fill="#fbbf24">
    <path d="M13 2.5 6.2 13.1c-.27.42.03.95.52.95H11l-1 7.4c-.09.62.72.94 1.07.43L18 11.2c.28-.42-.02-.95-.52-.95H13l1-7.2c.09-.6-.69-.94-1-.55Z"/>
  </g>
  <text x="176" y="98" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">TheDiscomBill</text>
  <text x="178" y="132" font-size="17" font-weight="600" fill="#fbbf24" letter-spacing="2">ELECTRICITY BILL CALCULATOR · ALL INDIA</text>

  <!-- Headline -->
  <text x="72" y="258" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Calculate your bill for</text>
  <text x="72" y="320" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">any Indian DISCOM<tspan fill="#fbbf24">.</tspan></text>
  <text x="72" y="366" font-size="23" font-weight="400" fill="#c7d6f0">Slab-wise breakdown · FPPA · duty · solar</text>

  <!-- Feature chips -->
  <g font-size="20" font-weight="600" fill="#ffffff">
    <rect x="72" y="404" width="176" height="48" rx="24" fill="#ffffff" fill-opacity="0.10" stroke="#fbbf24" stroke-opacity="0.55"/>
    <text x="160" y="434" text-anchor="middle">70+ DISCOMs</text>
    <rect x="262" y="404" width="168" height="48" rx="24" fill="#ffffff" fill-opacity="0.10" stroke="#fbbf24" stroke-opacity="0.55"/>
    <text x="346" y="434" text-anchor="middle">FPPA + duty</text>
    <rect x="444" y="404" width="216" height="48" rx="24" fill="#ffffff" fill-opacity="0.10" stroke="#fbbf24" stroke-opacity="0.55"/>
    <text x="552" y="434" text-anchor="middle">Solar net-metering</text>
  </g>

  <!-- Domain -->
  <text x="72" y="556" font-size="26" font-weight="700" fill="#fbbf24">thediscombill.com</text>

  <!-- ── Right column: bill breakdown card ───────────────────── -->
  <g filter="url(#cardShadow)">
    <rect x="704" y="92" width="424" height="446" rx="26" fill="#ffffff"/>
  </g>
  <!-- card content -->
  <text x="736" y="146" font-size="15" font-weight="700" fill="#64748b" letter-spacing="1.5">ESTIMATED MONTHLY BILL</text>
  <!-- DISCOM pill -->
  <rect x="1000" y="122" width="96" height="30" rx="15" fill="#eff4ff"/>
  <text x="1048" y="142" font-size="14" font-weight="600" fill="#2563eb" text-anchor="middle">300 units</text>

  <text x="734" y="212" font-size="62" font-weight="800" fill="url(#totalBlue)" letter-spacing="-1">₹1,533</text>

  <line x1="736" y1="242" x2="1096" y2="242" stroke="#e2e8f0" stroke-width="2"/>

  <g font-size="21">
    <text x="736" y="288" fill="#475569">Energy charge</text>
    <text x="1096" y="288" fill="#0f172a" font-weight="700" text-anchor="end">₹1,240.00</text>

    <text x="736" y="330" fill="#475569">Fixed charge</text>
    <text x="1096" y="330" fill="#0f172a" font-weight="700" text-anchor="end">₹120.00</text>

    <text x="736" y="372" fill="#475569">FPPA (fuel surcharge)</text>
    <text x="1096" y="372" fill="#0f172a" font-weight="700" text-anchor="end">₹98.40</text>

    <text x="736" y="414" fill="#475569">Electricity duty (5%)</text>
    <text x="1096" y="414" fill="#0f172a" font-weight="700" text-anchor="end">₹74.60</text>
  </g>

  <line x1="736" y1="444" x2="1096" y2="444" stroke="#e2e8f0" stroke-width="2"/>
  <text x="736" y="486" font-size="22" font-weight="700" fill="#0f172a">Total payable</text>
  <text x="1096" y="487" font-size="24" font-weight="800" fill="#2563eb" text-anchor="end">₹1,533.00</text>

  <text x="736" y="516" font-size="14" font-weight="500" fill="#94a3b8">⚡ Slab-wise, to the paisa · every state &amp; UT</text>
</svg>
